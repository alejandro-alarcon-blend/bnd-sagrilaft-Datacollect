---
metadata:
  title: Test vinculacion contraparte
---
modules:
  - .test

---
objects:
  - documentos: DAFileList.using(gathered=True)
  - rut_emp: DAFile
  - doc_rep: DAFile
  - empresa: Organization
  - persona: Individual
---
question: |
  Información del representante legal
fields:
  - Nombres del representante: persona.nombres
    required: True
  - Apellidos del representante: persona.apellidos
    required: True
  - Numero de identificacion: persona.id
    datatype: integer
    required: True 
---
question: |
  Información básica de la empresa
fields:
  - Nombre o razón social: empresa.nombre
    required: True
  - NIT: empresa.nit
    datatype: integer
    required: True 
  - E-mail: empresa.email
    required: True 
  - Telefono: empresa.tel
    datatype: integer

---
question: |
  Adjunte su RUT en PDF

fields:
  - RUT: rut_emp
    datatype: file
    required: True
    
---
question: |
  Adjunte su documento de identidad en PDF

fields:
  - ID: doc_rep
    datatype: file
    required: True
    
---
question: |
  Adjunte las referencias bancarias de soporte

fields:
  - Referencias bancarias: documentos
    datatype: files
    required: True
    
---
mandatory: True
code: |
  persona.nombres
  empresa.nombre
  rut_emp
  doc_rep
  documentos

  resultado_envio = enviar_archivos(rut_emp, empresa, persona)
  
  resultado_envio = enviar_archivos(doc_rep, empresa, persona)

  resultado_envio = enviar_archivos(documentos, empresa, persona)
  
  status_code = resultado_envio[0]
  response_text = resultado_envio[1]

---
mandatory: True
question: |
  ¡Gracias por enviar los documentos!
subquestion: |
  Tu proceso ha finalizado con éxito.
  
buttons:
  - Salir: exit
    url: https://www.google.com